<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Certificate Verification</h2>
        <p class="subtitle">Enter a Certificate ID to verify its authenticity.</p>
        
        <form id="verify-form">
            <input type="text" id="cert-id-input" placeholder="e.g., CRC-20250801-K9X" required>
            <button type="submit" class="btn">Verify</button>
        </form>

        <div id="status-message" style="margin-top: 15px; font-size: 0.9rem; font-weight: 500;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
